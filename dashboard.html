<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard QA PRO</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>

<style>
body { font-family: 'Segoe UI'; background:#f4f7f6; padding:20px; }

.grid { display:grid; grid-template-columns: repeat(4,1fr); gap:15px; margin-bottom:20px;}

.grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }

.card {
    padding:20px;
    border-radius:10px;
    color:white;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

.green { background:#2ecc71; }
.red { background:#e74c3c; }
.yellow { background:#f1c40f; color:#333;}
.blue { background:#34495e;}

.box { background:white; padding:20px; border-radius:10px; margin-bottom:20px; }

.alert { background:#e74c3c; color:white; padding:12px; border-radius:6px; margin-bottom:10px; }

canvas { max-height:300px; }

.details { display:none; }

.message {
    max-width:70%;
    padding:10px 14px;
    margin:6px;
    border-radius:15px;
    font-size:14px;
    display:inline-block;
}

.agente {
    background:#3498db;
    color:white;
    align-self:flex-end;
    margin-left:auto;
    text-align:right;
}

.cliente {
    background:#ecf0f1;
    color:#2c3e50;
    align-self:flex-start;
}

.time {
    font-size:10px;
    opacity:0.5;
    margin-top:4px;
}

#tablaAuditoria td, #tablaAuditoria th {
    padding:10px;
    border-bottom:1px solid #eee;
    font-size:13px;
}

#tablaAuditoria tr:hover {
    background:#f9f9f9;
}

.bad {
    color:#e74c3c;
    font-weight:bold;
}

.medium {
    color:#f39c12;
    font-weight:bold;
}

.good {
    color:#2ecc71;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>📊 Dashboard QA Inteligente PRO</h1>

<!-- KPI -->
<div class="grid">
    <div class="card green" id="kpiAprobados">0</div>
    <div class="card red" id="kpiReprobados">0</div>
    <div class="card yellow" id="kpiPromedio">0</div>
    <div class="card blue" id="kpiTotal">0</div>
</div>

<!-- ALERTAS -->
<div class="box">
<h3>🚨 Alertas Inteligentes</h3>
<div id="alertas"></div>
</div>

<!-- BARRA + TORTA -->
<div class="grid-2">
    <div class="box"><canvas id="barChart"></canvas></div>
    <div class="box"><canvas id="pieChart"></canvas></div>
</div>

<!-- NUEVAS GRÁFICAS -->
<div class="grid-2">
    <div class="box"><canvas id="estadoChart"></canvas></div>
    <div class="box"><canvas id="transicionesChart"></canvas></div>
</div>

<!-- SCATTER -->
<div class="box"><canvas id="scatterChart"></canvas></div>

<!-- TABLA -->
<div class="box">
<table id="tabla" class="display">
<thead>
<tr><th>Archivo</th><th>Score</th><th>Resultado</th><th>Acción</th></tr>
</thead>
</table>
</div>

<!-- DETALLE -->
<div class="box details" id="panel">

<h3>Detalle QA</h3>

<p><b>Resultado:</b> <span id="detRes"></span></p>
<p><b>Tiempo crítico:</b> <span id="detTiempo"></span></p>
<p><b>Análisis:</b> <span id="detAnalisis"></span></p>
<p><b>Observaciones:</b> <span id="detObs"></span></p>
<p><b>Conclusión:</b> <span id="detCon"></span></p>

<canvas id="radar"></canvas>
<canvas id="line"></canvas>
<h3>💬 Transcripción de la llamada</h3>
<div id="chatContainer" style="
    max-height:400px;
    overflow-y:auto;
    padding:15px;
    background:#f1f1f1;
    border-radius:10px;
"></div>

<h3>📋 Matriz de Auditoría</h3>

<table id="tablaAuditoria" style="width:100%; border-collapse:collapse; margin-top:10px;">
    <thead style="background:#2c3e50; color:white;">
        <tr>
            <th>Atributo</th>
            <th>Peso</th>
            <th>Cumplimiento</th>
            <th>Score</th>
            <th>Observación</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

</div>

<script>

let dataGlobal=[], radarChart, lineChart;

const opcionesEjes = {
    plugins:{
        tooltip:{
            callbacks:{
                label:function(ctx){
                    return `Valor: ${ctx.raw}`;
                }
            }
        }
    }
};

$(document).ready(function(){

    $.getJSON('datos_dashboard.json', function(data){

        dataGlobal = data;

        let aprobados = data.filter(d=>d.resultado==="APROBADO").length;
        let reprobados = data.filter(d=>d.resultado==="REPROBADO").length;
        let promedio = (data.reduce((a,b)=>a+b.score_final,0)/data.length).toFixed(2);

        $('#kpiAprobados').text("✅ Aprobados: "+aprobados);
        $('#kpiReprobados').text("❌ Reprobados: "+reprobados);
        $('#kpiPromedio').text("📈 Promedio: "+promedio);
        $('#kpiTotal').text("📊 Total: "+data.length);

        // ALERTAS
        let alerts="";
        data.forEach(d=>{
            if(d.score_final<60)
                alerts+=`<div class='alert'>⚠️ Score bajo (${d.score_final}) en ${d.archivo}</div>`;

            if(d.semaforo?.resumen?.momentos_criticos?.length>0)
                alerts+=`<div class='alert'>🔥 Caída emocional en ${d.archivo}</div>`;
        });

        $('#alertas').html(alerts || "✅ Sin alertas");

        // ✅ BARRA (CON VALORES)
        new Chart(barChart,{
            type:'bar',
            data:{
                labels:data.map(d=>d.archivo),
                datasets:[{
                    label:'Score',
                    data:data.map(d=>d.score_final),
                    backgroundColor:'#3498db'
                }]
            },
            options:{
                scales:{
                    x:{title:{display:true,text:'Llamadas'}},
                    y:{title:{display:true,text:'Score'}, min:0,max:100}
                },
                plugins:{
                    tooltip:{
                        callbacks:{
                            label:c=>`Score: ${c.raw}`
                        }
                    }
                }
            }
        });

        // ✅ TORTA
        new Chart(pieChart,{
            type:'pie',
            data:{
                labels:['Aprobado','Reprobado'],
                datasets:[{data:[aprobados,reprobados]}]
            },
            options:{
                plugins:{
                    tooltip:{
                        callbacks:{
                            label:c=>`${c.label}: ${c.raw}`
                        }
                    }
                }
            }
        });

        // ✅ ESTADOS
        let positivos=0, neutros=0, negativos=0;

        data.forEach(d=>{
            positivos+=d.semaforo.resumen.positivos;
            neutros+=d.semaforo.resumen.neutros;
            negativos+=d.semaforo.resumen.negativos;
        });

        new Chart(estadoChart,{
            type:'doughnut',
            data:{
                labels:['Positivo','Neutro','Negativo'],
                datasets:[{data:[positivos,neutros,negativos]}]
            },
            options:{
                plugins:{
                    tooltip:{
                        callbacks:{
                            label:c=>`${c.label}: ${c.raw}`
                        }
                    }
                }
            }
        });

        // ✅ TRANSICIONES
        let transCount={};

        data.forEach(d=>{
            d.semaforo.resumen.transiciones.forEach(t=>{
                let key=`${t.de} ➜ ${t.a}`;
                transCount[key]=(transCount[key]||0)+1;
            });
        });

        new Chart(transicionesChart,{
            type:'bar',
            data:{
                labels:Object.keys(transCount),
                datasets:[{
                    label:'Cantidad',
                    data:Object.values(transCount),
                    backgroundColor:'#9b59b6'
                }]
            },
            options:{
                scales:{
                    x:{title:{display:true,text:'Transiciones'}},
                    y:{title:{display:true,text:'Frecuencia'}}
                }
            }
        });

        // ✅ SCATTER
        new Chart(scatterChart,{
            type:'scatter',
            data:{
                datasets:[{
                    label:'Score vs Tiempo',
                    data:data.map(d=>({x:d.duracion,y:d.score_final})),
                    backgroundColor:c=>{
                        let y=c.raw.y;
                        return y>80?'green':y>60?'orange':'red';
                    }
                }]
            },
            options:{
                scales:{
                    x:{title:{display:true,text:'Duración (segundos)'}},
                    y:{title:{display:true,text:'Score'},min:0,max:100}
                },
                plugins:{
                    tooltip:{
                        callbacks:{
                            label:c=>`Tiempo: ${c.raw.x}s | Score: ${c.raw.y}`
                        }
                    }
                }
            }
        });

        // TABLA
        $('#tabla').DataTable({
            data:data,
            columns:[
                {data:'archivo'},
                {data:'score_final'},
                {data:'resultado'},
                {data:null, render:(d,t,r)=>`<button onclick="ver('${r.archivo}')">Ver</button>`}
            ]
        });

    });

});

function renderAuditoriaTable(auditoria){

    let html = "";

    auditoria.forEach(a => {

        let clase = "";

        if(a.cumplimiento >= 0.8) clase = "good";
        else if(a.cumplimiento >= 0.6) clase = "medium";
        else clase = "bad";

        html += `
        <tr>
            <td>${a.atributo}</td>
            <td>${a.peso_atributo}</td>
            <td class="${clase}">${(a.cumplimiento*100).toFixed(0)}%</td>
            <td class="${clase}">${a.score_obtenido}</td>
            <td>${a.observacion}</td>
        </tr>
        `;
    });

    document.querySelector("#tablaAuditoria tbody").innerHTML = html;
}

function ver(archivo){

    let d=dataGlobal.find(x=>x.archivo===archivo);
    renderAuditoriaTable(d.auditoria);

    $('#panel').show();

    $('#detRes').text(d.resultado);
    $('#detTiempo').text(d.analisis_grafica.tiempo);
    $('#detAnalisis').text(d.analisis_grafica.analisis);
    $('#detObs').text(d.analisis_grafica.observaciones);
    $('#detCon').text(d.analisis_grafica.conclusionIA);

    if(radarChart) radarChart.destroy();

    // ✅ RADAR CON VALORES
    radarChart=new Chart(radar,{
        type:'radar',
        data:{
            labels:d.auditoria.map(a=>a.atributo),
            datasets:[{
                label:'Score atributo',
                data:d.auditoria.map(a=>a.score_obtenido)
            }]
        }
    });

    // ✅ LINEAS MEJORADAS
    $.getJSON('transcripciones/'+archivo+'.json',function(trans){

        if(lineChart) lineChart.destroy();

        let tiempos=[], cliente=[], agente=[], lc=0, la=0;

        trans.forEach(t=>{
            tiempos.push(t.tiempo);

            if(t.rol==="CLIENTE") lc=t.sentimiento;
            if(t.rol==="AGENTE") la=t.sentimiento;

            cliente.push(lc);
            agente.push(la);
        });

        lineChart=new Chart(line,{
            type:'line',
            data:{
                labels:tiempos,
                datasets:[
                    {label:'Cliente',data:cliente,borderColor:'blue'},
                    {label:'Agente',data:agente,borderColor:'orange'}
                ]
            },
            options:{
                scales:{
                    x:{title:{display:true,text:'Tiempo'}},
                    y:{title:{display:true,text:'Sentimiento'},min:-1,max:1}
                },
                plugins:{
                    tooltip:{
                        callbacks:{
                            label:c=>`${c.dataset.label}: ${c.raw}`
                        }
                    }
                }
            }
        });

        renderChat(trans);
    });
}

function renderChat(trans){

    let html = "";

    trans.forEach(t=>{

        let clase = t.rol === "AGENTE" ? "agente" : "cliente";

        html += `
        <div style="display:flex; flex-direction:column;">
            <div class="message ${clase}">
                ${t.texto || t.text}
                <div class="time">${t.tiempo} | ${t.rol}</div>
            </div>
        </div>
        `;
    });

    $('#chatContainer').html(html);

    // Auto scroll al final
    $('#chatContainer').scrollTop($('#chatContainer')[0].scrollHeight);
}
</script>

</body>
</html>
